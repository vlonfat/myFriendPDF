name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macos
            sep: ":"
          - os: windows-latest
            name: windows
            sep: ";"
          - os: ubuntu-latest
            name: linux
            sep: ":"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tkinter (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller Pillow

      # ── Icon conversion ──────────────────────────────────────

      - name: Convert icon to .icns (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p assets/icon.iconset
          sips -z 16 16     assets/icon.png --out assets/icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon.png --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon.png --out assets/icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon.png --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon.png --out assets/icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon.png --out assets/icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon.png --out assets/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon.png --out assets/icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out assets/icon.iconset/icon_512x512@2x.png
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Convert icon to .ico (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -c "
          from PIL import Image
          img = Image.open('assets/icon.png')
          img.save('assets/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      # ── Builds ───────────────────────────────────────────────

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: >
          pyinstaller
          --onefile
          --windowed
          --name myFriendPDF
          --icon assets/icon.icns
          --add-data "assets:assets"
          --hidden-import pages.operations.merge_pdf
          --hidden-import pages.operations.split_pdf
          --hidden-import pages.operations.compress_pdf
          --hidden-import pages.operations.rotate_pdf
          --hidden-import pages.operations.pdf_to_word
          --hidden-import pages.operations.word_to_pdf
          main.py

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: >
          pyinstaller
          --onefile
          --windowed
          --name myFriendPDF
          --icon assets/icon.ico
          --add-data "assets;assets"
          --hidden-import pages.operations.merge_pdf
          --hidden-import pages.operations.split_pdf
          --hidden-import pages.operations.compress_pdf
          --hidden-import pages.operations.rotate_pdf
          --hidden-import pages.operations.pdf_to_word
          --hidden-import pages.operations.word_to_pdf
          main.py

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: >
          pyinstaller
          --onefile
          --windowed
          --name myFriendPDF
          --add-data "assets:assets"
          --hidden-import pages.operations.merge_pdf
          --hidden-import pages.operations.split_pdf
          --hidden-import pages.operations.compress_pdf
          --hidden-import pages.operations.rotate_pdf
          --hidden-import pages.operations.pdf_to_word
          --hidden-import pages.operations.word_to_pdf
          main.py

      # ── Upload artifacts ─────────────────────────────────────

      - name: Rename binary (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: mv dist/myFriendPDF dist/myFriendPDF-${{ matrix.name }}

      - name: Upload artifact (macOS / Linux)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: myFriendPDF-${{ matrix.name }}
          path: dist/myFriendPDF-${{ matrix.name }}

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: myFriendPDF-windows
          path: dist/myFriendPDF.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            myFriendPDF-macos/myFriendPDF-macos
            myFriendPDF-windows/myFriendPDF.exe
            myFriendPDF-linux/myFriendPDF-linux
